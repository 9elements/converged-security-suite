name: Build and Test
on:
    push:
      tags:
        - v*
      branches:
        - main
    pull_request:

permissions:
  contents: read

jobs:
    build:
        strategy:
            matrix:
                go-arch: [amd64, arm64]
        runs-on: ubuntu-latest
        env:
            CGO_ENABLED: 0
            GOARCH: ${{ matrix.go-arch }}
        steps:
            - name: Checkout
              uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
            - name: Build txt-suite
              run: go build -ldflags '-X main.gitcommit=${{ github.sha }} -X main.gittag=${{ github.ref_name }} -w -extldflags "-static"' -o txt-suite cmd/core/txt-suite/*.go
            - name: Build txt-prov
              run: go build -ldflags '-X main.gitcommit=${{ github.sha }} -X main.gittag=${{ github.ref_name }} -w -extldflags "-static"' -o txt-prov cmd/core/txt-prov/*.go
            - name: Build bg-suite
              run: go build -ldflags '-X main.gitcommit=${{ github.sha }} -X main.gittag=${{ github.ref_name }} -w -extldflags "-static"' -o bg-suite cmd/core/bg-suite/*.go
            - name: Build bg-prov
              run: go build -ldflags '-X main.gitcommit=${{ github.sha }} -X main.gittag=${{ github.ref_name }} -w -extldflags "-static"' -o bg-prov cmd/core/bg-prov/*.go
            - name: Build pcr0tool
              run: go build -ldflags '-X main.gitcommit=${{ github.sha }} -X main.gittag=${{ github.ref_name }} -w -extldflags "-static"' -o pcr0tool cmd/exp/pcr0tool/*.go
            - name: Build amd-suite
              run: go build -ldflags '-X main.gitcommit=${{ github.sha }} -X main.gittag=${{ github.ref_name }} -w -extldflags "-static"' -o amd-suite cmd/exp/amd-suite/*.go
            - name: Save artifacts
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: artifacts-${{ matrix.go-arch }}
                  path: |
                    ./txt-suite
                    ./txt-prov
                    ./bg-suite
                    ./bg-prov
                    ./pcr0tool
                    ./amd-suite
            

    validate-goreleaser:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
            - name: Validate GoReleaser config
              uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
              with:
                distribution: goreleaser
                version: latest
                args: check

    test:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
            - name: go test
              run: go test -v ./pkg/...

    ValidationTestBootguard:
      needs: build
      runs-on: ubuntu-latest

      steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Download file
        run: |
          wget "https://download.asrock.com/BIOS/4677/W790%20WS(4.04)ROM.zip"
          unzip W790\ WS\(4.04\)ROM.zip
          mv W790-WS_4.04.ROM firmware.bin

      - name: Download Artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: artifacts-amd64
          path: ./artifacts

      - name: Make artifacts executable
        run: chmod +x ./artifacts/*

      - name: Check FIT
        run: |
          ./artifacts/bg-prov fit-show ./firmware.bin > fit.log 2>&1

      - name: Check FIT entries
        run: |
          cat fit.log | grep -s "KeyManifestRecord"
          cat fit.log | grep -s "BootPolicyManifestRecord"

      - name: Extract and Verify BPM and KM
        run: |
          ./artifacts/bg-prov bpm-export ./firmware.bin bpm.bin
          ./artifacts/bg-prov km-export ./firmware.bin km.bin
          ./artifacts/bg-prov bpm-verify ./bpm.bin
          ./artifacts/bg-prov km-verify ./km.bin

    generateTemplates:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
            - name: Install dependencies
              run: sudo apt-get install jq
            - name: Download Artifacts
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  name: artifacts-amd64
                  path: ./artifacts
            - name: Make artifacts executable
              run: chmod +x ./artifacts/*
            - name: Generate Template-v-1 (bg-prov)
              run: |
                ./artifacts/bg-prov template-v-1 --svn=1 --acmsvn=1 --nems=2 \
                --pbet=12 --ibbflags=1 --mchbar=123456 --vdtbar=120000 --dmabase0=130000 \
                --dmasize0=2048 --entrypoint=140000 --ibbhash=SHA256 config.json
                cat ./config.json | jq

            - name: Generate Template-v-2 (bg-prov)
              run: |
                ./artifacts/bg-prov template-v-1 --svn=1 --acmsvn=1 --nems=2 \
                --pbet=12 --ibbflags=1 --mchbar=123456 --vdtbar=120000 --dmabase0=130000 \
                --dmasize0=2048 --entrypoint=140000 --ibbhash=SHA256 config.json
                cat ./config.json | jq
    RoundTripValidation:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6.0.1

            - name: Install dependencies
              run: sudo apt update & sudo apt install openssl

            - name: Cache firmware images
              id: cache-firmware
              uses: actions/cache@v4
              with:
                path: |
                  firmware10.bin
                  firmware20.bin
                key: firmware-imgs

            - name: Download FW with BtG 1.0
              if: steps.cache-firmware.outputs.cache-hit != 'true'
              run: |
                wget "https://downloads.hpe.com/pub/softlib2/software1/pubfw-uefi/p736852486/v283550/U30_3.66_04_01_2026.signed.flash"
                mv U30_3.66_04_01_2026.signed.flash firmware10.bin
            - name: Download FW with CBnT 2.0
              if: steps.cache-firmware.outputs.cache-hit != 'true'
              run: |
                wget "https://download.asrock.com/BIOS/4677/W790%20WS(9.01)ROM.zip"
                unzip W790\ WS\(9.01\)ROM.zip
                mv W790-WS_9.01.ROM firmware20.bin
            - name: Download Artifacts
              uses: actions/download-artifact@v7.0.0
              with:
                name: artifacts-amd64
                path: ./artifacts

            - name: Make artifacts executable
              run: chmod +x ./artifacts/*

            - name: Read 1.0 config
              run: |
                ./artifacts/bg-prov read-config config10.json ./firmware10.bin
                ./artifacts/bg-prov bpm-export ./firmware10.bin bpm10.bin
                ./artifacts/bg-prov km-export ./firmware10.bin km10.bin
                sha256sum km10.bin > checksums
                sha256sum bpm10.bin >> checksums
                rm km10.bin bpm10.bin

            - name: Extract pubkey from KM 1.0
              run: .github/scripts/extract_km_pubkey.sh config10.json v1-keymanifest km_pub10.pem

            - name: Generate 1.0 from config
              run: |
                ./artifacts/bg-prov bpm-gen-v-1 --config=config10.json bpm10.bin ./firmware10.bin
                ./artifacts/bg-prov km-gen-v-1 --config=config10.json km10.bin km_pub10.pem
                sha256sum -c checksums

            - name: Read 2.0 config
              run: |
                ./artifacts/bg-prov read-config config20.json ./firmware20.bin
                ./artifacts/bg-prov bpm-export ./firmware20.bin bpm20.bin
                ./artifacts/bg-prov km-export ./firmware20.bin km20.bin
                sha256sum km20.bin > checksums
                sha256sum bpm20.bin >> checksums
                rm km20.bin bpm20.bin

            - name: Extract pubkey from KM 2.0
              run: .github/scripts/extract_km_pubkey.sh config20.json v2-keymanifest km_pub20.pem

            - name: Generate 2.0 from config
              run: |
                ./artifacts/bg-prov bpm-gen-v-2 --config=config20.json bpm20.bin ./firmware20.bin
                ./artifacts/bg-prov km-gen-v-2 --config=config20.json km20.bin km_pub20.pem
                sha256sum -c checksums
